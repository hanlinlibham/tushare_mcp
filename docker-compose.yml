services:
  findatamcp:
    build: .
    image: findatamcp:latest
    container_name: findatamcp
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:?TUSHARE_TOKEN is required}
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: 8006
      SERVER_BASE_URL: ${SERVER_BASE_URL:-http://127.0.0.1:8006}
      # Swap to SSE by overriding command:
      #   command: ["python", "-m", "findatamcp.server_sse"]
    volumes:
      - findatamcp-data:/data

volumes:
  findatamcp-data:
